name: KiwiFlow Agent Worker

on:
  repository_dispatch:
    types: [process_task]
  schedule:
    - cron: '*/10 * * * *'  # poll every 10 minutes
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID to process'
        required: false

jobs:
  work:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install agile-team
        run: pip install -e .
      
      - name: Run worker
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "${{ github.event.client_payload.task_id }}" ]; then
            TID="${{ github.event.client_payload.task_id }}"
            REPO=$(curl -sf "https://kiwi-flow.vercel.app/api/tasks/$TID" | python3 -c "import json,sys,re; t=json.load(sys.stdin); [print(re.search(r'github\.com/maugomez77/([\w-]+)', e['message']).group(1)) for e in t.get('activity_log',[]) if 'github.com/maugomez77/' in e.get('message','')]" 2>/dev/null | tail -1)
            agile-team apply "$TID" -o /tmp/output --repo "${REPO:-sports-dashboard}"
          else
            agile-team work -o /tmp/output --test
          fi
      
      - name: E2E Tests (Playwright)
        if: always()
        run: |
          npm install playwright 2>/dev/null || true
          npx playwright install chromium 2>/dev/null || true
          cat > /tmp/e2e.js << 'PLAYEOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const url = process.env.DEPLOY_URL || 'https://sports-dashboard-kbblgi4tg-mauriciogomez77-8197s-projects.vercel.app';
            console.log(`Testing: ${url}`);
            await page.goto(url, { waitUntil: 'networkidle' });
            const title = await page.title();
            console.log(`Title: ${title}`);
            const cards = await page.$$('.article-card, [class*=card], [class*=article]');
            console.log(`Cards found: ${cards.length}`);
            const buttons = await page.$$('button');
            console.log(`Buttons: ${buttons.length}`);
            const errors = [];
            page.on('console', msg => { if (msg.type() === 'error') errors.push(msg.text()); });
            await page.waitForTimeout(3000);
            console.log(`Console errors: ${errors.length}`);
            await browser.close();
          })();
          PLAYEOF
          node /tmp/e2e.js
        if: always()
        run: |
          echo "Work complete. Check kiwi-flow.vercel.app for results."
