          - text: "| **AC5** | `last_updated` timestamp in response is within 60 seconds of current time | Integration test | P1 |"
          - text: "| **AC6** | Articles with `video_url` return valid URL in response | Unit test | P1 |"
          - text: "| **AC7** | `?q=LeBron` returns articles containing \"LeBron\" in title/summary | Integration test | P1 |"
          - text: "| **AC8** | `?lang=es` returns only Spanish-language articles | Integration test | P2 |"
          - text: "| **AC9** | Invalid league parameter returns 400 with clear error message | Unit test | P0 |"
          - text: "| **AC10** | Missing API key returns 401 | Integration test | P0 |"
          - text: "| **AC11** | Rate limit exceeded returns 429 with retry-after header | Load test | P0 |"
          - text: "| **AC12** | P95 latency <200ms under 1000 concurrent requests | Performance test | P0 |"
          - text: "| **AC13** | Zero articles returned for valid filters returns empty array (not error) | Unit test | P1 |"
          - text: "| **AC14** | `since` and `until` parameters correctly filter by timestamp | Integration test | P"
