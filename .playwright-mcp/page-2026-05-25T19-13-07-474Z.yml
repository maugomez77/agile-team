        - text: "| `page` | integer | No | 1 | Min: 1, Max: 100 | Page number for pagination |"
        - text: "| `limit` | integer | No | 20 | Min: 1, Max: 100 | Items per page |"
        - text: "| `sort` | string | No | timestamp_desc | One of: timestamp_desc, timestamp_asc, popularity | Sort order |"
        - text: "| `q` | string | No | - | Max length: 200 | Full-text search query |"
        - text: "| `lang` | string | No | en | ISO 639-1 code (en, es, fr, de, it, pt) | Language filter |"
        - text: "| `user_id` | string | No | - | UUID v4 format | For personalized feeds (P2) |"
        - text: "| `since` | datetime | No | - | ISO 8601 format | Return articles after this timestamp |"
        - text: "| `until` | datetime | No | - | ISO 8601 format | Return articles before this timestamp |"
        - text: "### 2.3 Response Schema"
        - text: "```json"
        - text: "{"
        - text: "\"status\": \"success\","
        - text: "\"data\": {"
        - text: "\"articles\": ["
        - text: "{"
        - text: "\"id\": \"uuid-v4-string\","
        - text: "\"title\": \"string (max 300 chars)\","
        - text: "\"summary\": \"string (max 500 chars)\","
        - text: "\"body\": \"string (optional, truncated to 1000 chars)\","
        - text: "\"url\": \"string (absolute URL)\","
        - text: "\"source\": {"
        - text: "\"name\": \"string\","
        - text: "\"domain\": \"string\","
        - text: "\"logo_url\": \"string (optional)\""
        - text: "},"
        - text: "\"league\": \"string (nba|nfl|mlb|nhl|soccer)\","
        - text: "\"category\": \"string (highlights|scores|transfers|injuries|analysis)\","
        - text: "\"published_at\": \"ISO 8601 datetime string\","
        - text: "\"updated_at\": \"ISO 8601 datetime string\","
        - text: "\"thumbnail_url\": \"string (optional, absolute URL)\","
        - text: "\"video_url\": \"string (optional)\","
        - text: "\"tags\": [\"string array (max 10 tags)\"],"
        - text: "\"engagement\": {"
        - text: "\"views\": \"integer\","
        - text: "\"shares\": \"integer\","
        - text: "\"comments\": \"integer\""
        - text: "}"
        - text: "}"
        - text: "],"
        - text: "\"pagination\": {"
        - text: "\"page\": \"integer\","
        - text: "\"limit\": \"integer\","
        - text: "\"total_items\": \"integer\","
        - text: "\"total_pages\": \"integer\","
        - text: "\"has_next\": \"boolean\","
        - text: "\"has_prev\": \"boolean\","
        - text: "\"next_page\": \"string (URL, null if last page)\","
        - text: "\"prev_page\": \"string (URL, null if first page)\""
        - text: "},"
        - text: "\"metadata\": {"
        - text: "\"request_id\": \"uuid-v4-string\","
        - text: "\"last_updated\": \"ISO 8601 datetime string\","
        - text: "\"cached\": \"boolean\","
        - text: "\"cache_ttl_remaining\": \"integer (seconds)\","
        - text: "\"processing_time_ms\": \"integer\""
        - text: "}"
        - text: "},"
        - text: "\"error\": null"
        - text: "}"
        - text: "```"
        - text: "### 2.4 Error Response Schema"
        - text: "```json"
        - text: "{"
        - text: "\"status\": \"error\","
        - text: "\"data\": null,"
        - text: "\"error\": {"
        - text: "\"code\": \"string (error code)\","
        - text: "\"message\": \"string (human-readable)\","
        - text: "\"details\": {},"
        - text: "\"request_id\": \"uuid-v4-string\""
        - text: "}"
        - text: "}"
        - text: "```"
        - text: "### 2.5 HTTP Status Codes"
        - text: "| Code | Description | When |"
        - text: "|------|-------------|------|"
        - text: "| `200` | Success | Request processed successfully |"
        - text: "| `400` | Bad Request | Invalid parameters or validation failure |"
        - text: "| `401` | Unauthorized | Missing or invalid API key |"
        - text: "| `403` | Forbidden | API key lacks permission for requested scope |"
        - text: "| `404` | Not Found | Invalid endpoint (shouldn't happen for /v1/sports) |"
        - text: "| `429` | Too Many Requests | Rate limit exceeded |"
        - text: "| `500` | Internal Server Error | Unexpected server error |"
        - text: "| `503` | Service Unavailable | Upstream news sources unavailable |"
        - text: "### 2.6 Error Codes"
        - text: "| Code | HTTP Status | Message | Details |"
        - text: "|------|-------------|---------|---------|"
        - text: "| `INVALID_PARAMETER` | 400 | \"Invalid value for parameter '{param}'\" | {param: \"league\", value: \"invalid_league\", allowed: [...]} |"
        - text: "| `MISSING_PARAMETER` | 400 | \"Required parameter '{param}' is missing\" | {param: \"page\"} |"
        - text: "| `RATE_LIMIT_EXCEEDED` | 429 | \"Rate limit exceeded. Retry after {seconds}s\" | {retry_after: 60, limit: 100, window: \"1m\"} |"
        - text: "| `SOURCE_UNAVAILABLE` | 503 | \"News sources temporarily unavailable\" | {estimated_restore: \"ISO 8601\"} |"
        - text: "| `INTERNAL_ERROR` | 500 | \"An unexpected error occurred\" | {reference_id: \"uuid\"} |"
        - text: "---"
        - text: "## 3. Detailed Implementation Requirements"
        - text: "### 3.1 Authentication & Authorization"
        - text: "- **API Key Method**: Header-based: `X-API-Key:"
        - generic [ref=e25]:
          - text: "`"
          - text: "- **Rate Limiting Tiers**:"
          - text: "- Free: 100 requests/min, 10,000/day"
          - text: "- Pro: 1,000 requests/min, 100,000/day"
          - text: "- Enterprise: Custom (negotiated)"
          - text: "- **Key Validation**: Check against PostgreSQL `api_keys` table with Redis cache (TTL: 5 min)"
          - text: "- **Scope Validation**: Keys can be scoped to specific leagues or categories"
          - text: "### 3.2 Caching Strategy"
          - text: "| Cache Level | Key Pattern | TTL | Invalidation |"
          - text: "|-------------|-------------|-----|--------------|"
          - text: "| **CDN Edge** | URL-based | 30s | Cache-bust on new article publish |"
          - text: "| **Redis** | `sports:{league}:{category}:{page}:{limit}:{sort}:{lang}` | 60s | TTL expiration, manual purge on breaking news |"
          - text: "| **Application** | In-memory LRU (1000 items) | 5s | LRU eviction |"
          - text: "**Cache Invalidation Events:**"
          - text: "- New article published → Purge affected league/category keys"
          - text: "- Breaking news flag → Immediate full purge"
          - text: "- Scheduled purge every 5 minutes for stale entries"
          - text: "### 3.3 Database Schema"
          - text: "```sql"
          - text: "-- Articles table"
          - text: CREATE TABLE articles (
          - text: id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          - text: external_id VARCHAR(255) UNIQUE,
          - text: title TEXT NOT NULL,
          - text: summary TEXT,
          - text: body TEXT,
          - text: url TEXT NOT NULL,
          - text: source_name VARCHAR(100) NOT NULL,
          - text: source_domain VARCHAR(255),
          - text: source_logo_url TEXT,
          - text: league VARCHAR(20) NOT NULL CHECK (league IN ('nba', 'nfl', 'mlb', 'nhl', 'soccer')),
          - text: category VARCHAR(20) NOT NULL CHECK (category IN ('highlights', 'scores', 'transfers', 'injuries', 'analysis')),
          - text: language VARCHAR(5) DEFAULT 'en',
          - text: published_at TIMESTAMPTZ NOT NULL,
          - text: updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          - text: thumbnail_url TEXT,
          - text: video_url TEXT,
          - text: tags TEXT[],
          - text: views_count INTEGER DEFAULT 0,
          - text: shares_count INTEGER DEFAULT 0,
          - text: comments_count INTEGER DEFAULT 0,
          - text: is_breaking BOOLEAN DEFAULT FALSE,
          - text: metadata JSONB,
          - text: created_at TIMESTAMPTZ DEFAULT NOW(),
          - text: "-- Indexes"
          - text: CONSTRAINT valid_timestamp CHECK (published_at <= updated_at)
          - text: );
          - text: "-- Indexes for performance"
          - text: CREATE INDEX idx_articles_league_category ON articles(league, category);
          - text: CREATE INDEX idx_articles_published_at ON articles(published_at DESC);
          - text: CREATE INDEX idx_articles_source ON articles(source_name);
          - text: CREATE INDEX idx_articles_language ON articles(language);
          - text: CREATE INDEX idx_articles_tags ON articles USING GIN(tags);
          - text: CREATE INDEX idx_articles_metadata ON articles USING GIN(metadata);
          - text: CREATE INDEX idx_articles_fulltext ON articles USING GIN(to_tsvector('english', title || ' ' || COALESCE(summary, '')));
          - text: "-- API Keys table"
          - text: CREATE TABLE api_keys (
          - text: id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          - text: key_hash VARCHAR(64) NOT NULL UNIQUE,
          - text: name VARCHAR(100),
          - text: tier VARCHAR(20) NOT NULL DEFAULT 'free' CHECK (tier IN ('free', 'pro', 'enterprise')),
          - text: "scopes JSONB DEFAULT '{\"leagues\": [\"all\"], \"categories\": [\"all\"]}',"
          - text: rate_limit_per_min INTEGER DEFAULT 100,
          - text: rate_limit_per_day INTEGER DEFAULT 10000,
          - text: is_active BOOLEAN DEFAULT TRUE,
          - text: created_at TIMESTAMPTZ DEFAULT NOW(),
          - text: expires_at TIMESTAMPTZ
          - text: );
          - text: "-- Rate limiting tracking"
          - text: CREATE TABLE rate_limit_usage (
          - text: api_key_id UUID REFERENCES api_keys(id),
          - text: window_start TIMESTAMPTZ NOT NULL,
          - text: request_count INTEGER DEFAULT 1,
          - text: PRIMARY KEY (api_key_id, window_start)
          - text: );
          - text: "```"
          - text: "### 3.4 Elasticsearch Index Mapping"
          - text: "```json"
          - text: "{"
          - text: "\"mappings\": {"
          - text: "\"properties\": {"
          - text: "\"id\": { \"type\": \"keyword\" },"
          - text: "\"title\": {"
          - text: "\"type\": \"text\","
          - text: "\"fields\": {"
          - text: "\"keyword\": { \"type\": \"keyword\" }"
          - text: "}"
          - text: "},"
          - text: "\"summary\": { \"type\": \"text\" },"
          - text: "\"body\": { \"type\": \"text\" },"
          - text: "\"league\": { \"type\": \"keyword\" },"
          - text: "\"category\": { \"type\": \"keyword\" },"
          - text: "\"language\": { \"type\": \"keyword\" },"
          - text: "\"published_at\": { \"type\": \"date\" },"
          - text: "\"tags\": { \"type\": \"keyword\" },"
          - text: "\"source_name\": { \"type\": \"keyword\" },"
          - text: "\"is_breaking\": { \"type\": \"boolean\" },"
          - text: "\"engagement_score\": { \"type\": \"float\" }"
          - text: "}"
          - text: "},"
          - text: "\"settings\": {"
          - text: "\"number_of_shards\": 3,"
          - text: "\"number_of_replicas\": 2,"
          - text: "\"refresh_interval\": \"30s\""
          - text: "}"
          - text: "}"
          - text: "```"
          - text: "### 3.5 News Ingestion Pipeline"
          - text: "```"
          - text: External Sources
          - text: ├── ESPN API (REST)
          - text: ├── SportsData.io (REST)
          - text: ├── NewsAPI.org (REST)
          - text: └── RSS Feeds (XML)
          - text: │
          - text: ▼
          - text: News Aggregator Service
          - text: ├── Normalize to unified schema
          - text: ├── Deduplication (by external_id + source)
          - text: ├── Language detection (if not provided)
          - text: └── Publish to RabbitMQ
          - text: │
          - text: ▼
          - text: "RabbitMQ Queue: sports.news.ingest"
          - text: "├── Exchange: topic"
          - text: "├── Routing keys: nba.highlights, nfl.scores, etc."
          - text: "└── Dead letter queue: sports.news.failed"
          - text: │
          - text: ▼
          - text: Ingestion Workers (x5 min, auto-scale)
          - text: ├── Validate schema
          - text: ├── Enrich with metadata (tags, categories)
          - text: ├── Store in PostgreSQL
          - text: ├── Index in Elasticsearch
          - text: ├── Update Redis cache keys
          - text: └── Acknowledge message
          - text: "```"
          - text: "---"
          - text: "## 4. Performance Requirements"
          - text: "### 4.1 Service Level Objectives (SLOs)"
          - text: "| Metric | Target | Measurement | Severity |"
          - text: "|--------|--------|-------------|----------|"
          - text: "| **P95 Latency** | <200ms | Request duration across 5-min window | Critical |"
          - text: "| **P99 Latency** | <500ms | Request duration across 5-min window | Warning |"
          - text: "| **Availability** | 99.95% | Uptime over 30-day rolling window | Critical |"
          - text: "| **Error Rate** | <0.1% | 5xx responses / total requests | Critical |"
          - text: "| **Cache Hit Rate** | >80% | Redis cache hits / total requests | Warning |"
          - text: "| **Freshness** | <60s | Time from publish to API availability | Critical |"
          - text: "### 4.2 Scalability Targets"
          - text: "| Metric | Current Target | Future Target (Q3) |"
          - text: "|--------|----------------|--------------------|"
          - text: "| **Concurrent Requests** | 5,000/s | 20,000/s |"
          - text: "| **Daily Active Users** | 500,000 | 2,000,000 |"
          - text: "| **Articles Indexed** | 50,000/day | 200,000/day |"
          - text: "| **Data Retention** | 30 days hot, 90 days warm | 90 days hot, 365 days cold |"
          - text: "### 4.3 Resource Estimates (per node)"
          - text: "| Resource | Development | Staging | Production |"
          - text: "|----------|-------------|---------|------------|"
          - text: "| **CPU** | 2 cores | 4 cores | 8 cores |"
          - text: "| **Memory** | 4 GB | 8 GB | 16 GB |"
          - text: "| **Disk** | 50 GB SSD | 100 GB SSD | 500 GB SSD |"
          - text: "| **Nodes** | 1 | 3 | 5 (min) auto-scale to 20 |"
          - text: "---"
          - text: "## 5. Acceptance Criteria"
          - text: "### 5.1 Functional Acceptance Criteria"
          - text: "| ID | Criteria | Verification Method | Priority |"
          - text: "|----|----------|-------------------|----------|"
          - text: "| **AC1** | API returns 200 with valid article array for `GET /v1/sports` | Integration test | P0 |"
