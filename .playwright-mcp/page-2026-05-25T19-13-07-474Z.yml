        - text: └──────────────┘ └──────────────┘ └──────────────┘
        - text: "```"
        - text: "### 1.2 Technology Stack"
        - text: "| Component | Technology | Justification |"
        - text: "|-----------|------------|---------------|"
        - text: "| **API Framework** | FastAPI (Python 3.11+) | Async support, auto-docs, Pydantic validation |"
        - text: "| **Database** | PostgreSQL 15 | JSONB support for flexible article schemas, full-text search |"
        - text: "| **Cache** | Redis 7 | Sub-millisecond reads, TTL-based invalidation |"
        - text: "| **Search** | Elasticsearch 8 | Full-text search, faceted filtering, aggregations |"
        - text: "| **Message Queue** | RabbitMQ | Async news ingestion, decoupled architecture |"
        - text: "| **Containerization** | Docker + Kubernetes | Auto-scaling, rolling deployments |"
        - text: "| **Monitoring** | Prometheus + Grafana | P95 latency tracking, error budgets |"
        - text: "| **CDN** | CloudFront/Cloudflare | Edge caching for static assets (images) |"
        - text: "### 1.3 Data Flow"
        - text: "```"
        - text: 1. External News Sources ──▶ News Aggregator Service ──▶ RabbitMQ
        - text: 2. RabbitMQ ──▶ News Ingestion Worker ──▶ PostgreSQL + Elasticsearch
        - text: 3. Client Request ──▶ API Gateway ──▶ Rate Limiter Check
        - text: "4. Rate Limiter OK ──▶ Redis Cache Check (Key: sports:{league}:{page})"
        - text: 5. Cache MISS ──▶ API Service ──▶ Elasticsearch Query
        - text: 6. Elasticsearch Results ──▶ Response Assembly ──▶ Redis Cache Set
        - text: 7. Response ──▶ Client
        - text: "```"
        - text: "---"
        - text: "## 2. API Specification"
        - text: "### 2.1 Endpoint Definition"
        - text: "```"
        - text: GET /v1/sports
        - text: "```"
        - text: "### 2.2 Request Parameters"
        - text: "| Parameter | Type | Required | Default | Validation | Description |"
        - text: "|-----------|------|----------|---------|------------|-------------|"
        - text: "| `league` | string | No | all | One of: nba, nfl, mlb, nhl, soccer, all | Filter by sports league |"
